<!doctype html>
<html lang="id" id="html-root">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>2Brother's Coffee | Super Admin Dashboard</title>
    <meta
      name="description"
      content="Super Admin dashboard with full control over revenue, analytics, and system settings."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="super-admin-wrapper">
      <!-- Sidebar -->
      <aside class="super-admin-sidebar" id="superAdminSidebar">
        <div class="super-admin-sidebar-header">
          <div class="super-admin-avatar">
            <i class="fas fa-crown"></i>
          </div>
          <h4 class="super-admin-name" id="superAdminName">Super Admin</h4>
          <p class="super-admin-email" id="superAdminEmail">
            super@2brothers.coffee
          </p>
          <span class="super-admin-role">Super Administrator</span>
        </div>
        <nav class="super-admin-nav">
          <a href="#" class="super-admin-nav-item active" data-page="dashboard">
            <i class="fas fa-tachometer-alt"></i> Dashboard
          </a>
          <a href="#" class="super-admin-nav-item" data-page="revenue">
            <i class="fas fa-chart-line"></i> Revenue & Analytics
          </a>
          <a href="#" class="super-admin-nav-item" data-page="products">
            <i class="fas fa-chart-pie"></i> Product Analysis
          </a>
          <a href="#" class="super-admin-nav-item" data-page="customers">
            <i class="fas fa-users"></i> Customer Insights
          </a>
          <a href="#" class="super-admin-nav-item" data-page="admins">
            <i class="fas fa-user-shield"></i> Manage Admins
          </a>
          <a href="#" class="super-admin-nav-item" data-page="activity">
            <i class="fas fa-history"></i> Activity Log
          </a>
          <a href="#" class="super-admin-nav-item" data-page="backup">
            <i class="fas fa-database"></i> Backup & Restore
          </a>
          <a href="#" class="super-admin-nav-item" data-page="settings">
            <i class="fas fa-cog"></i> System Settings
          </a>
        </nav>
        <div class="super-admin-sidebar-footer">
          <button
            class="btn-outline logout-btn"
            id="logoutBtn"
            style="width: 100%"
          >
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="super-admin-main">
        <div class="super-admin-header">
          <h1 id="pageTitle">Super Admin Dashboard</h1>
          <span class="super-admin-badge">Full Access</span>
        </div>
        <div id="superAdminContent">
          <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i> Loading...
          </div>
        </div>
      </main>
    </div>

    <div class="mobile-super-admin-toggle" id="mobileSuperAdminToggle">
      <i class="fas fa-bars"></i>
    </div>

    <script src="js/core/config.js"></script>
    <script src="js/pages/super-admin.js"></script>
  </body>
</html>
